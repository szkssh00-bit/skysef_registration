<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SKYSEF 2026 QR Registration</title>
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,"Hiragino Sans",Meiryo,sans-serif;color:#172033;background:#f6f8fb;line-height:1.7}
.container{width:min(1160px,calc(100% - 40px));margin:0 auto}
.nav{position:fixed;inset:0 0 auto 0;z-index:10;background:rgba(255,255,255,.94);border-bottom:1px solid #d9e2ec}
.nav-inner{min-height:72px;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0}
.brand{font-weight:900;color:#0b1f3a}
.nav button,.btn{border-radius:999px;padding:10px 16px;font-weight:900;cursor:pointer;margin:4px}
.nav button{border:1px solid #b8dff1;background:#ecfaff;color:#095a77}
.btn{border:0}.primary{background:#0b1f3a;color:#fff}.secondary{background:#eef5fb;color:#0b1f3a;border:1px solid #c8d6e4}.btn:disabled{opacity:.55;cursor:not-allowed}
.section{padding:110px 0 60px}.card{background:#fff;border:1px solid #d9e2ec;border-radius:22px;box-shadow:0 16px 40px rgba(12,31,58,.12);padding:32px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}.full{grid-column:1/-1}
.eyebrow{color:#00a6d6;font-weight:800;letter-spacing:.12em;text-transform:uppercase;font-size:.82rem}
h1,h2{color:#0b1f3a;line-height:1.15;margin:10px 0 20px}h1{font-size:clamp(2rem,4vw,3.2rem)}
.qr-reader{width:100%;max-width:680px;min-height:460px;border:1px solid #d9e2ec;border-radius:18px;overflow:hidden;background:#071426;margin-top:12px}
.note{margin-top:10px;color:#5f6f82;font-size:.9rem;white-space:pre-wrap}.error{color:#d93025;font-weight:800}.success{color:#137333;font-weight:800}
.latest{border-radius:20px;padding:22px;border:1px solid #d9e2ec;background:#f8fbfe}.latest-name{font-size:2.2rem;font-weight:900;color:#0b1f3a}.latest-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.success-card{background:#effaf1}.warning-card{background:#fff7e8}.error-card{background:#fff0f0;color:#b3261e}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}.stat{background:#f8fbfe;border:1px solid #d9e2ec;border-radius:18px;padding:18px}.stat b{display:block;font-size:2.2rem;color:#0b1f3a}
.list{display:grid;gap:10px;max-height:520px;overflow:auto}.item{border:1px solid #d9e2ec;border-radius:14px;padding:12px;background:#f8fbfe;display:grid}
.view{display:none}.view.active{display:block}
.name-card{background:linear-gradient(135deg,#0b1f3a,#123d68);color:#fff;border-radius:24px;padding:28px;margin:22px 0}.label{color:#8de7ff;font-weight:900}.participant-name{font-size:clamp(2rem,7vw,4.2rem);font-weight:900}
table{width:100%;border-collapse:collapse}th,td{text-align:left;padding:14px 16px;border-bottom:1px solid #d9e2ec}th{width:170px;background:#0b1f3a;color:white}
.field{margin-top:12px}.field label{display:block;font-weight:900;margin-bottom:5px}.field input,.field textarea,.manual-row input{width:100%;border:1px solid #b8c7d7;border-radius:12px;padding:10px 12px}.field textarea{min-height:110px}
.manual-row{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.manual-row input{flex:1;min-width:240px}
@media(max-width:900px){.grid,.stats,.latest-grid{grid-template-columns:1fr}.card{padding:24px}th,td{display:block;width:100%}.nav-inner{align-items:flex-start;flex-direction:column}.qr-reader{min-height:360px}}
</style>
</head>
<body>
<nav class="nav"><div class="container nav-inner"><div class="brand">SKYSEF 2026 QR System</div><div><button type="button" onclick="showStaff()">Reception</button><button type="button" onclick="promptParticipant()">Participant Test</button></div></div></nav>
<main>
<section id="participant-view" class="section view"><div class="container"><div class="card"><div class="eyebrow">Participant Information</div><h1>Your SKYSEF Information</h1><div id="participant-content"></div></div></div></section>
<section id="correction-view" class="section view"><div class="container"><div class="card"><div class="eyebrow">Correction Request</div><h1>Name Correction</h1><div class="field"><label>ID</label><input id="correction-id" readonly></div><div class="field"><label>Corrected Name</label><input id="corrected-name"></div><div class="field"><label>Note</label><textarea id="correction-note"></textarea></div><button type="button" class="btn primary" onclick="submitCorrection()">Submit</button><button type="button" class="btn secondary" onclick="showParticipant(document.getElementById('correction-id').value)">Back</button><p id="correction-message" class="note"></p></div></div></section>
<section id="staff-view" class="section view"><div class="container"><div class="grid">
<section class="card"><div class="eyebrow">Reception</div><h1>QR Check-in</h1><button id="start-camera-button" type="button" class="btn primary" onclick="startCamera()">カメラを起動</button><button id="stop-camera-button" type="button" class="btn secondary" onclick="stopCamera()" disabled>カメラを停止</button><button type="button" class="btn secondary" onclick="diagnoseCamera()">カメラ診断</button><div class="manual-row"><input id="manual-id" placeholder="Manual ID input"><button type="button" class="btn secondary" onclick="manualCheckIn()">Manual Check-in</button></div><div id="reader" class="qr-reader"></div><p id="scan-status" class="note">カメラ起動ボタンを押してください。</p><p id="camera-debug" class="note"></p></section>
<section class="card"><div class="eyebrow">Latest Result</div><h2 id="result-title">Waiting</h2><div id="latest-card" class="latest">Please scan a name tag QR code.</div></section>
<section class="card full"><div class="stats"><div class="stat"><b id="total-count">0</b><span>Total</span></div><div class="stat"><b id="present-count">0</b><span>Checked in</span></div><div class="stat"><b id="absent-count">0</b><span>Not checked in</span></div></div><h2>Not Checked-in List</h2><div id="absent-list" class="list"></div></section>
</div></div></section>
</main>
<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzdERtGEJ-jMHQoNWZMorPE9uKtESp2OKxe1lEdE2ahGCYeNLQgB2X54xHcrdvdwdMx/exec";
let lastId = "";
let lastTime = 0;
let processing = false;
let qr = null;
let cameraRunning = false;
function init(){
  window.addEventListener("error", function(e){ const st = document.getElementById("scan-status"); if(st) st.textContent = "JavaScript error: " + e.message + "\n" + e.filename + ":" + e.lineno; });
  const p = new URLSearchParams(location.search); const mode = p.get("mode") || ""; const id = p.get("id") || "";
  if(mode === "staff"){ showStaff(); return; }
  if(id){ showParticipant(id); return; }
  showStaff();
}
function active(id){ document.querySelectorAll(".view").forEach(function(v){ v.classList.remove("active"); }); const el = document.getElementById(id); if(el) el.classList.add("active"); }
function showStaff(){ history.replaceState(null, "", location.pathname + "?mode=staff"); active("staff-view"); loadSummary(); }
function promptParticipant(){ const id = prompt("Participant ID"); if(id) showParticipant(id); }
async function showParticipant(id){
  id = String(id || "").trim(); history.replaceState(null, "", location.pathname + "?id=" + encodeURIComponent(id)); active("participant-view");
  const box = document.getElementById("participant-content"); box.innerHTML = '<p class="note">Loading...</p>';
  try{ const d = await gasGet({api:"participant", id:id}); if(!d.ok || !d.participant){ box.innerHTML = '<p class="error">This ID was not found: ' + esc(id) + '</p>'; return; }
    const p = d.participant; box.innerHTML =
      '<div class="name-card"><div class="label">Name</div><div class="participant-name">' + esc(p.Name) + '</div></div>' +
      '<table><tr><th>Region</th><td>' + esc(p.Region) + '</td></tr><tr><th>School</th><td>' + esc(p.School) + '</td></tr><tr><th>Name</th><td>' + esc(p.Name) + '</td></tr><tr><th>Oral No.</th><td>' + esc(p.OralNo) + '</td></tr><tr><th>Poster No.</th><td>' + esc(p.PosterNo) + '</td></tr><tr><th>IJP1 Group</th><td>' + esc(p.IJP1) + '</td></tr><tr><th>IJP2 Group</th><td>' + esc(p.IJP2) + '</td></tr></table>' +
      '<button type="button" class="btn primary" onclick="showCorrection(\'' + js(id) + '\')">Request name correction</button>' +
      (p.CorrectionStatus ? '<p class="note">Correction status: ' + esc(p.CorrectionStatus) + '</p>' : '');
  }catch(e){ box.innerHTML = '<p class="error">' + esc(e.message || String(e)) + '</p>'; }
}
function showCorrection(id){ active("correction-view"); document.getElementById("correction-id").value = id; document.getElementById("corrected-name").value = ""; document.getElementById("correction-note").value = ""; document.getElementById("correction-message").textContent = ""; }
async function submitCorrection(){
  const id = document.getElementById("correction-id").value; const correctedName = document.getElementById("corrected-name").value; const note = document.getElementById("correction-note").value; const m = document.getElementById("correction-message");
  m.className = "note"; m.textContent = "Submitting...";
  try{ const d = await gasGet({api:"correction", id:id, correctedName:correctedName, note:note}); m.textContent = d.ok ? d.message : d.error; m.className = d.ok ? "success" : "error"; }catch(e){ m.textContent = e.message || String(e); m.className = "error"; }
}
function extractId(txt){ try{ return new URL(txt).searchParams.get("id") || ""; }catch(e){ const m = String(txt || "").match(/[?&]id=([^&]+)/); return m ? decodeURIComponent(m[1]) : String(txt || "").trim(); } }
async function diagnoseCamera(){
  const dbg = document.getElementById("camera-debug"); let msg = "Secure context: " + (window.isSecureContext ? "YES" : "NO") + "\n"; msg += "URL: " + location.href + "\n"; msg += "mediaDevices: " + (navigator.mediaDevices ? "YES" : "NO") + "\n"; msg += "Html5Qrcode: " + (window.Html5Qrcode ? "YES" : "NO") + "\n";
  try{ const cams = await Html5Qrcode.getCameras(); msg += "Cameras: " + cams.length + "\n"; cams.forEach(function(c,i){ msg += "[" + i + "] " + c.label + " / " + c.id + "\n"; }); }catch(e){ msg += "getCameras error: " + (e.message || String(e)) + "\n"; }
  dbg.textContent = msg;
}
async function startCamera(){
  const st = document.getElementById("scan-status"); const sb = document.getElementById("start-camera-button"); const tb = document.getElementById("stop-camera-button"); const dbg = document.getElementById("camera-debug");
  if(cameraRunning) return; if(!window.isSecureContext){ st.textContent = "カメラはHTTPSまたはlocalhostでしか起動できません。GitHub Pagesのhttps URLで開いてください。"; return; } if(!window.Html5Qrcode){ st.textContent = "html5-qrcodeライブラリを読み込めません。ネットワーク制限を確認してください。"; return; }
  st.textContent = "カメラを起動しています..."; sb.disabled = true; dbg.textContent = "";
  try{ if(!qr) qr = new Html5Qrcode("reader", { verbose: false }); let cameras = []; try{ cameras = await Html5Qrcode.getCameras(); }catch(e){ cameras = []; }
    const config = { fps: 12, qrbox: function(w,h){ const size = Math.floor(Math.min(w,h) * 0.75); return { width: size, height: size }; }, aspectRatio: 1.0, rememberLastUsedCamera: true, experimentalFeatures: { useBarCodeDetectorIfSupported: true } };
    const candidates = []; if(cameras && cameras.length > 0){ const back = cameras.find(function(c){ return /back|rear|environment|外|背面/i.test(c.label || ""); }); if(back) candidates.push({ deviceId: { exact: back.id } }); candidates.push({ deviceId: { exact: cameras[0].id } }); }
    candidates.push({ facingMode: "environment" }); candidates.push({ facingMode: "user" });
    let lastErr = null; for(const cam of candidates){ try{ await qr.start(cam, config, onScanSuccess, function(){}); cameraRunning = true; st.textContent = "カメラ起動中です。QRコードを画面中央に大きく写してください。"; tb.disabled = false; sb.disabled = true; return; }catch(e){ lastErr = e; try{ if(qr && qr.isScanning) await qr.stop(); }catch(stopErr){} } }
    throw lastErr || new Error("No camera candidate worked.");
  }catch(err){ cameraRunning = false; sb.disabled = false; tb.disabled = true; st.textContent = "カメラを起動できませんでした: " + (err.message || String(err)); diagnoseCamera(); }
}
function stopCamera(){ if(!qr || !cameraRunning) return; const st = document.getElementById("scan-status"); const sb = document.getElementById("start-camera-button"); const tb = document.getElementById("stop-camera-button"); st.textContent = "カメラを停止しています..."; qr.stop().then(function(){ cameraRunning = false; st.textContent = "カメラを停止しました。"; sb.disabled = false; tb.disabled = true; }).catch(function(err){ st.textContent = "カメラ停止時にエラーが発生しました: " + err; }); }
function manualCheckIn(){ const id = document.getElementById("manual-id").value.trim(); if(id) processCheckIn(id); }
function onScanSuccess(txt){ const id = extractId(txt); if(id) processCheckIn(id); }
function processCheckIn(id){ const now = Date.now(); if(!id || processing || (id === lastId && now - lastTime < 3500)) return; lastId = id; lastTime = now; processing = true; document.getElementById("scan-status").textContent = "Processing: " + id; gasGet({api:"checkin", id:id}).then(function(d){ renderResult(d, id); if(d.summary) renderSummary(d.summary); setTimeout(function(){ processing = false; if(cameraRunning) document.getElementById("scan-status").textContent = "Ready for next scan."; }, 900); }).catch(function(e){ renderError(e.message || String(e)); processing = false; }); }
async function loadSummary(){ try{ const d = await gasGet({api:"summary"}); if(d.ok) renderSummary(d.summary); else renderError(d.error || "Summary API error."); }catch(e){ renderError(e.message || String(e)); } }
async function gasGet(params){ const u = new URL(GAS_URL); Object.keys(params).forEach(function(k){ u.searchParams.set(k, params[k]); }); u.searchParams.set("t", Date.now()); const r = await fetch(u.toString(), {method:"GET", cache:"no-store"}); if(!r.ok) throw new Error("GAS response error: " + r.status); return await r.json(); }
function renderResult(d,id){ const t = document.getElementById("result-title"); const c = document.getElementById("latest-card"); if(!d || !d.ok){ t.textContent = "Error"; c.className = "latest error-card"; c.innerHTML = "<b>" + esc((d && d.error) || "Error") + "</b><br>ID: " + esc(id); return; } const p = d.participant || {}; t.textContent = d.status || "Checked in."; c.className = d.status === "Already checked in." ? "latest warning-card" : "latest success-card"; c.innerHTML = '<div class="latest-name">' + esc(p.Name) + '</div><div>' + esc(p.School) + '</div><div class="latest-grid"><span>Region: <b>' + esc(p.Region) + '</b></span><span>Oral: <b>' + esc(p.OralNo) + '</b></span><span>Poster: <b>' + esc(p.PosterNo) + '</b></span><span>IJP1: <b>' + esc(p.IJP1) + '</b></span><span>IJP2: <b>' + esc(p.IJP2) + '</b></span></div>'; }
function renderSummary(s){ if(!s) return; document.getElementById("total-count").textContent = s.total || 0; document.getElementById("present-count").textContent = s.present || 0; document.getElementById("absent-count").textContent = s.absent || 0; const list = document.getElementById("absent-list"); list.innerHTML = ""; (s.absentList || []).forEach(function(p){ const d = document.createElement("div"); d.className = "item"; d.innerHTML = "<b>" + esc(p.Name) + "</b><span>" + esc(p.School) + "</span><span>Oral: " + esc(p.OralNo || "-") + " / Poster: " + esc(p.PosterNo || "-") + " / IJP1: " + esc(p.IJP1 || "-") + " / IJP2: " + esc(p.IJP2 || "-") + "</span>"; list.appendChild(d); }); }
function renderError(msg){ document.getElementById("result-title").textContent = "Error"; const c = document.getElementById("latest-card"); c.className = "latest error-card"; c.textContent = msg; }
function esc(v){ return String(v || "").replace(/[&<>"']/g, function(s){ return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[s]; }); }
function js(v){ return String(v || "").replace(/\\/g, "\\\\").replace(/'/g, "\\'"); }
window.addEventListener("load", function(){ init(); setInterval(function(){ const staff = document.getElementById("staff-view"); if(staff && staff.classList.contains("active")) loadSummary(); }, 15000); });
</script>
</body>
</html>
