<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SKYSEF 2026 QR</title><script src="https://unpkg.com/html5-qrcode"></script><style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,"Hiragino Sans",Meiryo,sans-serif;background:#f6f8fb;color:#172033;line-height:1.7}.container{width:min(1160px,calc(100% - 40px));margin:auto}.nav{position:fixed;inset:0 0 auto 0;z-index:10;background:#fff;border-bottom:1px solid #d9e2ec}.nav-inner{min-height:72px;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0}.brand{font-weight:900;color:#0b1f3a}button,.btn{border-radius:999px;padding:10px 16px;font-weight:900;cursor:pointer;margin:4px;border:0}.nav button{border:1px solid #b8dff1;background:#ecfaff;color:#095a77}.primary{background:#0b1f3a;color:#fff}.secondary{background:#eef5fb;color:#0b1f3a;border:1px solid #c8d6e4}.section{padding:110px 0 60px}.card{background:#fff;border:1px solid #d9e2ec;border-radius:22px;box-shadow:0 16px 40px rgba(12,31,58,.12);padding:32px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}.full{grid-column:1/-1}.eyebrow{color:#00a6d6;font-weight:800;letter-spacing:.12em;text-transform:uppercase;font-size:.82rem}h1,h2{color:#0b1f3a;margin:10px 0 20px;line-height:1.15}h1{font-size:clamp(2rem,4vw,3.2rem)}.qr-wrap{position:relative;max-width:680px;background:#071426;border-radius:18px;margin-top:12px;overflow:hidden}#reader{width:100%;min-height:420px;background:#071426}.scan-frame{position:absolute;left:50%;top:50%;width:54%;aspect-ratio:1;transform:translate(-50%,-50%);border:4px solid #00e0ff;border-radius:18px;box-shadow:0 0 0 9999px rgba(0,0,0,.28);pointer-events:none}.scan-frame:after{content:"QRを枠内に大きく入れてください";position:absolute;left:50%;bottom:-42px;transform:translateX(-50%);white-space:nowrap;color:#fff;background:rgba(0,0,0,.65);padding:4px 10px;border-radius:999px;font-weight:700;font-size:.85rem}.note{margin-top:10px;color:#5f6f82;font-size:.9rem;white-space:pre-wrap}.error{color:#d93025;font-weight:800}.success{color:#137333;font-weight:800}.latest{border-radius:20px;padding:22px;border:1px solid #d9e2ec;background:#f8fbfe}.latest-name{font-size:2.2rem;font-weight:900;color:#0b1f3a}.latest-grid,.stats{display:grid;gap:12px}.latest-grid{grid-template-columns:1fr 1fr}.stats{grid-template-columns:repeat(5,1fr);margin-bottom:22px}.stat{background:#f8fbfe;border:1px solid #d9e2ec;border-radius:18px;padding:18px}.stat b{display:block;font-size:2rem;color:#0b1f3a}.success-card{background:#effaf1}.warning-card{background:#fff7e8}.error-card{background:#fff0f0;color:#b3261e}.view{display:none}.view.active{display:block}.list{display:grid;gap:10px;max-height:520px;overflow:auto}.item{border:1px solid #d9e2ec;border-radius:14px;padding:12px;background:#f8fbfe}.name-card{background:linear-gradient(135deg,#0b1f3a,#123d68);color:#fff;border-radius:24px;padding:28px;margin:22px 0}.label{color:#8de7ff;font-weight:900}.participant-name{font-size:clamp(2rem,7vw,4.2rem);font-weight:900}table{width:100%;border-collapse:collapse;background:#fff}th,td{padding:12px 14px;border-bottom:1px solid #d9e2ec;text-align:left}th{background:#0b1f3a;color:#fff}td{font-weight:700}.info-table th{width:170px}.attendance-table th,.attendance-table td{text-align:center}.att-ok{color:#137333;font-weight:900}.att-ng{color:#9aa4b2;font-weight:900}.field{margin-top:12px}.field label{display:block;font-weight:900;margin-bottom:5px}.field input,.field textarea,.manual-row input{width:100%;border:1px solid #b8c7d7;border-radius:12px;padding:10px 12px}.field textarea{min-height:110px}.manual-row{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.manual-row input{flex:1;min-width:240px}@media(max-width:900px){.grid,.stats,.latest-grid{grid-template-columns:1fr}.card{padding:24px}.info-table th,.info-table td{display:block;width:100%}.nav-inner{align-items:flex-start;flex-direction:column}#reader{min-height:340px}.scan-frame{width:62%}}
</style></head><body><nav class="nav"><div class="container nav-inner"><div class="brand">SKYSEF 2026 QR System</div><div><button onclick="showStaff()">Reception</button><button onclick="promptParticipant()">Participant Test</button></div></div></nav><main>
<section id="participant-view" class="section view"><div class="container"><div class="card"><div class="eyebrow">Participant Information</div><h1>Your SKYSEF Information</h1><div id="participant-content"></div></div></div></section>
<section id="correction-view" class="section view"><div class="container"><div class="card"><div class="eyebrow">Correction Request</div><h1>Name Correction</h1><div class="field"><label>ID</label><input id="correction-id" readonly></div><div class="field"><label>Corrected Name</label><input id="corrected-name"></div><div class="field"><label>Note</label><textarea id="correction-note"></textarea></div><button class="btn primary" onclick="submitCorrection()">Submit</button><button class="btn secondary" onclick="showParticipant(document.getElementById('correction-id').value)">Back</button><p id="correction-message" class="note"></p></div></div></section>
<section id="staff-view" class="section view"><div class="container"><div class="grid"><section class="card"><div class="eyebrow">Reception</div><h1>QR Check-in</h1><div class="manual-row"><input id="manual-id" placeholder="Manual ID input"><button class="btn secondary" onclick="manualCheckIn()">Manual Check-in</button></div><div class="qr-wrap"><div id="reader"></div><div class="scan-frame"></div></div><p id="scan-status" class="note">ページ表示後、自動でカメラ起動を試みます。</p></section><section class="card"><div class="eyebrow">Latest Result</div><h2 id="result-title">Waiting</h2><div id="latest-card" class="latest">Please scan a name tag QR code.</div></section><section class="card full"><div class="stats"><div class="stat"><b id="total-count">0</b><span>Total</span></div><div class="stat"><b id="d0802-count">0</b><span>8/2</span></div><div class="stat"><b id="d0803-count">0</b><span>8/3</span></div><div class="stat"><b id="d0804-count">0</b><span>8/4</span></div><div class="stat"><b id="d0805-count">0</b><span>8/5</span></div></div><h2>Attendance by Date</h2><div id="attendance-table-box"></div><h2>Not Checked-in Today</h2><div id="absent-list" class="list"></div></section></div></div></section></main>
<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbwoKKqva7uym7UGjgZLtkgYymGQsVfwwcS2a_B7SvGSvPejFKxxGMm3fmXBZlfCf88V/exec';let lastId="",lastTime=0,processing=false,qr=null,cameraRunning=false,autoCameraTried=false,stableText="",stableCount=0;
function init(){window.addEventListener("error",e=>{const st=document.getElementById("scan-status");if(st)st.textContent="JavaScript error: "+e.message+"\n"+e.filename+":"+e.lineno;});const p=new URLSearchParams(location.search),mode=p.get("mode")||"",id=p.get("id")||"";if(mode==="staff")return showStaff();if(id)return showParticipant(id);showStaff();}
function active(id){document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));document.getElementById(id).classList.add("active");}
function showStaff(){history.replaceState(null,"",location.pathname+"?mode=staff");active("staff-view");loadSummary();if(!autoCameraTried){autoCameraTried=true;setTimeout(startCameraAuto,400);}}
function promptParticipant(){const id=prompt("Participant ID");if(id)showParticipant(id);}
async function showParticipant(id){id=String(id||"").trim();history.replaceState(null,"",location.pathname+"?id="+encodeURIComponent(id));active("participant-view");const box=document.getElementById("participant-content");box.innerHTML='<p class="note">Loading...</p>';try{const d=await gasGet({api:"participant",id});if(!d.ok||!d.participant){box.innerHTML='<p class="error">This ID was not found: '+esc(id)+'</p>';return}const p=d.participant;box.innerHTML='<div class="name-card"><div class="label">Name</div><div class="participant-name">'+esc(p.Name)+'</div></div><table class="info-table"><tr><th>ID</th><td>'+esc(p.ID)+'</td></tr><tr><th>Region</th><td>'+esc(p.Region)+'</td></tr><tr><th>School</th><td>'+esc(p.School)+'</td></tr><tr><th>Name</th><td>'+esc(p.Name)+'</td></tr><tr><th>Current Name</th><td>'+esc(p.CurrentName)+'</td></tr><tr><th>Oral No.</th><td>'+esc(p.OralNo)+'</td></tr><tr><th>Poster No.</th><td>'+esc(p.PosterNo)+'</td></tr><tr><th>IJP1 Group</th><td>'+esc(p.IJP1)+'</td></tr><tr><th>IJP2 Group</th><td>'+esc(p.IJP2)+'</td></tr></table>'+attendanceTable([p])+'<button class="btn primary" onclick="showCorrection(\''+js(id)+'\')">Request name correction</button>'+(p.CorrectionStatus?'<p class="note">Correction status: '+esc(p.CorrectionStatus)+'</p>':'');}catch(e){box.innerHTML='<p class="error">'+esc(e.message||String(e))+'</p>';}}
function showCorrection(id){active("correction-view");document.getElementById("correction-id").value=id;document.getElementById("corrected-name").value="";document.getElementById("correction-note").value="";document.getElementById("correction-message").textContent="";}
async function submitCorrection(){const id=document.getElementById("correction-id").value,correctedName=document.getElementById("corrected-name").value,note=document.getElementById("correction-note").value,m=document.getElementById("correction-message");m.className="note";m.textContent="Submitting...";try{const d=await gasGet({api:"correction",id,correctedName,note});m.textContent=d.ok?d.message:d.error;m.className=d.ok?"success":"error";}catch(e){m.textContent=e.message||String(e);m.className="error";}}
function extractId(txt){try{return new URL(txt).searchParams.get("id")||"";}catch(e){const m=String(txt||"").match(/[?&]id=([^&]+)/);return m?decodeURIComponent(m[1]):String(txt||"").trim();}}
async function startCameraAuto(){if(cameraRunning)return;const st=document.getElementById("scan-status");if(!window.isSecureContext){st.textContent="カメラはHTTPSまたはlocalhostでのみ起動できます。";return}if(!window.Html5Qrcode){st.textContent="html5-qrcodeを読み込めません。";return}st.textContent="カメラを起動しています...";try{if(!qr)qr=new Html5Qrcode("reader",{verbose:false});let cameras=[];try{cameras=await Html5Qrcode.getCameras();}catch(e){}const config={fps:8,qrbox:(w,h)=>{const size=Math.floor(Math.min(w,h)*0.55);return{width:size,height:size};},aspectRatio:1.333,rememberLastUsedCamera:true,experimentalFeatures:{useBarCodeDetectorIfSupported:true},videoConstraints:{width:{ideal:640},height:{ideal:480},focusMode:"continuous",exposureMode:"continuous",whiteBalanceMode:"continuous"}};const candidates=[];if(cameras&&cameras.length){const back=cameras.find(c=>/back|rear|environment|外|背面/i.test(c.label||""));if(back)candidates.push({deviceId:{exact:back.id}});candidates.push({deviceId:{exact:cameras[0].id}});}candidates.push({facingMode:"environment",width:{ideal:640},height:{ideal:480}});candidates.push({facingMode:"user",width:{ideal:640},height:{ideal:480}});let lastErr=null;for(const cam of candidates){try{await qr.start(cam,config,onScanSuccess,()=>{});cameraRunning=true;st.textContent="カメラ起動中です。中央枠にQRを入れて、1秒ほど静止してください。";return;}catch(e){lastErr=e;try{if(qr&&qr.isScanning)await qr.stop();}catch(_){}}}throw lastErr||new Error("No camera candidate worked.");}catch(err){cameraRunning=false;st.textContent="カメラを起動できませんでした: "+(err.message||String(err))+"\nChromeのカメラ許可を確認してください。";}}
function manualCheckIn(){const id=document.getElementById("manual-id").value.trim();if(id)processCheckIn(id);}
function onScanSuccess(txt){const id=extractId(txt);if(!id)return;if(id===stableText)stableCount++;else{stableText=id;stableCount=1;}document.getElementById("scan-status").textContent="検出中: "+id+" ("+stableCount+"/2)";if(stableCount>=2){stableText="";stableCount=0;processCheckIn(id);}}
function processCheckIn(id){const now=Date.now();if(!id||processing||(id===lastId&&now-lastTime<1200))return;lastId=id;lastTime=now;processing=true;document.getElementById("scan-status").textContent="Processing: "+id;gasGet({api:"checkin",id}).then(d=>{renderResult(d,id);if(d.summary)renderSummary(d.summary);setTimeout(()=>{processing=false;if(cameraRunning)document.getElementById("scan-status").textContent="Ready for next scan."; },1200);}).catch(e=>{renderError(e.message||String(e));processing=false;});}
async function loadSummary(){try{const d=await gasGet({api:"summary"});if(d.ok)renderSummary(d.summary);else renderError(d.error||"Summary API error.");}catch(e){renderError(e.message||String(e));}}
async function gasGet(params){const u=new URL(GAS_URL);Object.keys(params).forEach(k=>u.searchParams.set(k,params[k]));u.searchParams.set("t",Date.now());const r=await fetch(u.toString(),{method:"GET",cache:"no-store"});if(!r.ok)throw new Error("GAS response error: "+r.status);return await r.json();}
function renderResult(d,id){const t=document.getElementById("result-title"),c=document.getElementById("latest-card");if(!d||!d.ok){t.textContent="Error";c.className="latest error-card";c.innerHTML="<b>"+esc((d&&d.error)||"Error")+"</b><br>ID: "+esc(id);return}const p=d.participant||{};t.textContent=d.status||"Checked in.";c.className=d.status==="Already checked in."?"latest warning-card":"latest success-card";c.innerHTML='<div class="latest-name">'+esc(p.Name)+'</div><div>'+esc(p.School)+'</div><div class="latest-grid"><span>Region: <b>'+esc(p.Region)+'</b></span><span>Oral: <b>'+esc(p.OralNo)+'</b></span><span>Poster: <b>'+esc(p.PosterNo)+'</b></span><span>IJP1: <b>'+esc(p.IJP1)+'</b></span><span>IJP2: <b>'+esc(p.IJP2)+'</b></span></div>'+attendanceTable([p]);}
function renderSummary(s){if(!s)return;document.getElementById("total-count").textContent=s.total||0;document.getElementById("d0802-count").textContent=s.counts&&s.counts.D0802||0;document.getElementById("d0803-count").textContent=s.counts&&s.counts.D0803||0;document.getElementById("d0804-count").textContent=s.counts&&s.counts.D0804||0;document.getElementById("d0805-count").textContent=s.counts&&s.counts.D0805||0;document.getElementById("attendance-table-box").innerHTML=attendanceTable(s.allList||[]);const list=document.getElementById("absent-list");list.innerHTML="";(s.absentTodayList||[]).forEach(p=>{const d=document.createElement("div");d.className="item";d.innerHTML="<b>"+esc(p.Name)+"</b><span>"+esc(p.School)+"</span><span>ID: "+esc(p.ID)+"</span>";list.appendChild(d);});}
function attendanceTable(list){let html='<table class="attendance-table"><tr><th>ID</th><th>Name</th><th>8/2</th><th>8/3</th><th>8/4</th><th>8/5</th></tr>';(list||[]).forEach(p=>{html+='<tr><td>'+esc(p.ID)+'</td><td>'+esc(p.Name)+'</td>'+dayCell(p.D0802At)+dayCell(p.D0803At)+dayCell(p.D0804At)+dayCell(p.D0805At)+'</tr>';});return html+'</table>';}
function dayCell(v){return v?'<td><span class="att-ok">済</span><br><small>'+esc(v)+'</small></td>':'<td><span class="att-ng">未</span></td>';}
function renderError(msg){document.getElementById("result-title").textContent="Error";const c=document.getElementById("latest-card");c.className="latest error-card";c.textContent=msg;}
function esc(v){return String(v||"").replace(/[&<>"']/g,s=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[s]));}
function js(v){return String(v||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'");}
window.addEventListener("load",()=>{init();setInterval(()=>{const staff=document.getElementById("staff-view");if(staff&&staff.classList.contains("active"))loadSummary();},15000);});
</script></body></html>
