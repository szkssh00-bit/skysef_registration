<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SKYSEF Check in System</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%}
body{font-family:Arial,"Hiragino Sans",Meiryo,sans-serif;background:#f3f6fa;color:#172033;line-height:1.55}
main{height:100vh;padding:8px}
.layout{display:grid;grid-template-columns:1.02fr 1.08fr .9fr;gap:8px;height:calc(100vh - 16px)}
.card{background:#fff;border:1px solid #d7e0ea;border-radius:12px;box-shadow:0 6px 18px rgba(12,31,58,.08);padding:14px;min-width:0;overflow:auto}
.title-black{font-family:"Arial Black",Arial,sans-serif;color:#0b1f3a;line-height:1.05}
h1.title-black{font-size:clamp(1.8rem,2.5vw,3.1rem);margin-bottom:10px}
h2.title-black{font-size:clamp(1.35rem,1.8vw,2rem);margin-bottom:10px}
.subhead{font-family:"Arial Black",Arial,sans-serif;color:#0b1f3a;font-size:1rem;margin:10px 0 8px}
.controls{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:10px}
.control-row{display:flex;align-items:center;gap:8px}
.control-row label{font-weight:900;white-space:nowrap}
select{width:100%;border:1px solid #afbecd;border-radius:9px;padding:9px 10px;background:#fff;font-weight:700}
.qr-wrap{position:relative;width:100%;height:calc(100vh - 170px);min-height:360px;background:#071426;border-radius:10px;overflow:hidden}
#reader{width:100%;height:100%;background:#071426}
.scan-guide{position:absolute;left:50%;top:50%;width:76%;max-height:88%;aspect-ratio:1;transform:translate(-50%,-50%);border:3px solid #00e0ff;border-radius:12px;pointer-events:none}
.status{margin-top:8px;padding:8px 10px;border-radius:9px;background:#eef5fb;color:#35516c;font-size:.9rem;font-weight:700;white-space:pre-wrap}
.status.local{background:#e7f4ff;color:#0b5ea8}.status.syncing{background:#fff3dc;color:#8a5200}.status.done{background:#e7f7ec;color:#137333}.status.error{background:#fff0f0;color:#b3261e}
.latest{border:1px solid #d7e0ea;border-radius:10px;padding:12px;background:#f8fbfe;min-height:112px}
.latest.success{background:#eaf8ee;border-color:#b8dec1}.latest.warning{background:#fff6df;border-color:#f0d494}.latest.error{background:#fff0f0;border-color:#efb5b5}
.latest-name{font-family:"Arial Black",Arial,sans-serif;font-size:1.7rem;color:#0b1f3a}
.latest-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 10px;margin-top:6px;font-size:.9rem}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:10px 0}
.metric{border:1px solid #d7e0ea;border-radius:9px;background:#f8fbfe;padding:8px}
.metric b{display:block;font-family:"Arial Black",Arial,sans-serif;font-size:1.35rem;color:#0b1f3a}
.metric span{font-size:.75rem;color:#5f6f82;font-weight:800}
.list{display:grid;gap:6px;overflow:auto}.attendance-list{max-height:calc(100vh - 350px)}.absent-list{max-height:calc(100vh - 92px)}
.item{border:1px solid #d7e0ea;border-radius:9px;padding:9px 10px;background:#f8fbfe;display:grid;gap:1px}
.item strong{font-family:"Arial Black",Arial,sans-serif;color:#0b1f3a}.item small{color:#5f6f82}
.flash{animation:flashGreen .85s ease}@keyframes flashGreen{0%{background:#00ff4c}35%{background:#00ff4c}100%{background:#f3f6fa}}
@media(max-width:1100px){body{height:auto}main{height:auto}.layout{grid-template-columns:1fr 1fr;height:auto}.card{overflow:visible}.absent-card{grid-column:1/-1}.qr-wrap{height:520px}.attendance-list,.absent-list{max-height:420px}}
@media(max-width:760px){.layout{grid-template-columns:1fr}.absent-card{grid-column:auto}.qr-wrap{height:420px}}
</style>
</head>
<body>
<main>
<div class="layout">
<section class="card camera-card">
  <h1 class="title-black">SKYSEF Check in System</h1>
  <div class="controls">
    <div class="control-row"><label for="event-date">Date</label><select id="event-date"><option value="8/2">August 2</option><option value="8/3">August 3</option><option value="8/4">August 4</option><option value="8/5">August 5</option></select></div>
    <div class="control-row"><label for="camera-select">Camera</label><select id="camera-select"><option value="">Loading cameras...</option></select></div>
  </div>
  <div class="qr-wrap"><div id="reader"></div><div class="scan-guide"></div></div>
  <div id="scan-status" class="status">Preparing camera and participant list...</div>
</section>
<section class="card checkin-card">
  <h2 class="title-black">Check-in Information</h2>
  <div id="latest-card" class="latest">Scan a participant QR code.</div>
  <div class="metrics"><div class="metric"><b id="planned-count">0</b><span>Planned</span></div><div class="metric"><b id="checked-count">0</b><span>Checked in</span></div><div class="metric"><b id="queue-count">0</b><span>Waiting to sync</span></div></div>
  <div id="sync-status" class="status done">Master list not loaded</div>
  <div class="subhead">Attendance List</div>
  <div id="attendance-list" class="list attendance-list"></div>
</section>
<section class="card absent-card">
  <h2 class="title-black">Not Checked-in Today</h2>
  <div id="absent-list" class="list absent-list"></div>
</section>
</div>
</main>
<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbzDwpZQHKPnbIjhVqU6uxMQRcvb7yQrEsHCfy6D3eY9q0csqifDFE-bgmaR2Mk8y8N1/exec';
const DATE_CONFIG={"8/2":{flag:"Flag 8/2",attendance:"Attended At 8/2"},"8/3":{flag:"Flag 8/3",attendance:"Attended At 8/3"},"8/4":{flag:"Flag 8/4",attendance:"Attended At 8/4"},"8/5":{flag:"Flag 8/5",attendance:"Attended At 8/5"}};
let participants=[],participantMap=new Map(),selectedDate="8/2",cameras=[],selectedCameraId="",qr=null,cameraRunning=false,processing=false,lastId="",lastTime=0,syncQueue=[],syncInFlight=false,flushTimer=null;
window.addEventListener("load",async function(){selectedDate=detectInitialDate();document.getElementById("event-date").value=selectedDate;restoreQueue();bindEvents();await Promise.all([loadMasterList(),loadCameraList()]);await startSelectedCamera();scheduleFlush(1200);setInterval(backgroundRefresh,30000);window.addEventListener("online",function(){scheduleFlush(100);});});
function bindEvents(){document.getElementById("event-date").addEventListener("change",function(e){selectedDate=e.target.value;renderSelectedDate();});document.getElementById("camera-select").addEventListener("change",async function(e){selectedCameraId=e.target.value;if(selectedCameraId)localStorage.setItem("skysef_camera_id",selectedCameraId);if(qr&&cameraRunning){try{await qr.stop();}catch(_){}cameraRunning=false;}await startSelectedCamera();});}
function detectInitialDate(){const p=new Intl.DateTimeFormat("en-US",{timeZone:"Asia/Tokyo",month:"numeric",day:"numeric"}).format(new Date());return DATE_CONFIG[p]?p:"8/2";}
async function loadMasterList(){setSyncStatus("syncing","Loading participant list...");try{const d=await gasGet({api:"master"});if(!d.ok)throw new Error(d.error||"Master API error.");participants=d.participants||[];participantMap=new Map();participants.forEach(p=>participantMap.set(normalizeId(p.ID),p));applyQueuedItemsToLocalData();renderSelectedDate();setSyncStatus("done","Participant list ready");}catch(e){setSyncStatus("error","Participant list load failed: "+(e.message||String(e)));}}
function applyQueuedItemsToLocalData(){syncQueue.forEach(e=>applyLocalAttendance(e.id,e.date,e.localTime));}
function flagValue(p,date){return String(p[DATE_CONFIG[date].flag]??"").trim()==="1";}
function attendanceValue(p,date){return p[DATE_CONFIG[date].attendance]||"";}
function setAttendanceValue(p,date,v){p[DATE_CONFIG[date].attendance]=v;p["Attended At"]=v;}
function plannedParticipants(date){return participants.filter(p=>flagValue(p,date));}
function checkedParticipants(date){return plannedParticipants(date).filter(p=>Boolean(attendanceValue(p,date))).sort((a,b)=>String(attendanceValue(b,date)).localeCompare(String(attendanceValue(a,date))));}
function absentParticipants(date){return plannedParticipants(date).filter(p=>!attendanceValue(p,date)).sort((a,b)=>String(a.Name||"").localeCompare(String(b.Name||"")));}
function renderSelectedDate(){const planned=plannedParticipants(selectedDate),checked=checkedParticipants(selectedDate),absent=absentParticipants(selectedDate);document.getElementById("planned-count").textContent=planned.length;document.getElementById("checked-count").textContent=checked.length;document.getElementById("queue-count").textContent=syncQueue.length;renderAttendanceList(checked);renderAbsentList(absent);}
function renderAttendanceList(list){const box=document.getElementById("attendance-list");box.innerHTML="";if(!list.length){box.innerHTML='<div class="item"><small>No check-ins yet.</small></div>';return;}list.forEach(p=>{const i=document.createElement("div");i.className="item";i.innerHTML="<strong>"+escapeHtml(p.Name)+"</strong><span>"+escapeHtml(p.School)+"</span><small>ID: "+escapeHtml(p.ID)+" / "+escapeHtml(attendanceValue(p,selectedDate))+"</small>";box.appendChild(i);});}
function renderAbsentList(list){const box=document.getElementById("absent-list");box.innerHTML="";if(!list.length){box.innerHTML='<div class="item"><strong>All planned participants checked in.</strong></div>';return;}list.forEach(p=>{const i=document.createElement("div");i.className="item";i.innerHTML="<strong>"+escapeHtml(p.Name)+"</strong><span>"+escapeHtml(p.School)+"</span><small>ID: "+escapeHtml(p.ID)+"</small>";box.appendChild(i);});}
async function loadCameraList(){const s=document.getElementById("camera-select");try{cameras=await Html5Qrcode.getCameras();s.innerHTML="";if(!cameras.length){s.innerHTML='<option value="">No camera found</option>';setScanStatus("error","No camera found.");return;}cameras.forEach((c,n)=>{const o=document.createElement("option");o.value=c.id;o.textContent=(n+1)+": "+(c.label||("Camera "+(n+1)));s.appendChild(o);});const saved=localStorage.getItem("skysef_camera_id");if(saved&&cameras.some(c=>c.id===saved))s.value=saved;else if(cameras.length>1)s.selectedIndex=1;else s.selectedIndex=0;selectedCameraId=s.value;}catch(e){s.innerHTML='<option value="">Camera error</option>';setScanStatus("error","Camera list error: "+(e.message||String(e)));}}
async function startSelectedCamera(){if(!selectedCameraId)return;setScanStatus("syncing","Starting camera...");try{if(!qr)qr=new Html5Qrcode("reader",{verbose:false});const config={fps:30,qrbox:(w,h)=>{const size=Math.floor(Math.min(w,h)*0.76);return{width:size,height:size};},aspectRatio:1.333,rememberLastUsedCamera:true,experimentalFeatures:{useBarCodeDetectorIfSupported:true},videoConstraints:{width:{ideal:640},height:{ideal:480},focusMode:"continuous",exposureMode:"continuous",whiteBalanceMode:"continuous"}};await qr.start({deviceId:{exact:selectedCameraId}},config,onScanSuccess,function(){});cameraRunning=true;setScanStatus("done","Camera ready. Scan the next QR code.");}catch(e){cameraRunning=false;setScanStatus("error","Camera start failed: "+(e.message||String(e)));}}
function onScanSuccess(t){const id=extractId(t);if(id)processLocalCheckIn(id);}
function processLocalCheckIn(id){const now=Date.now(),n=normalizeId(id);if(!n||processing)return;if(n===lastId&&now-lastTime<900)return;lastId=n;lastTime=now;processing=true;const p=participantMap.get(n);if(!p){showLatestError("ID not found",n);setScanStatus("error","QR read succeeded, but the ID is not in the local participant list.");processing=false;return;}if(!flagValue(p,selectedDate)){showLatestError("Not scheduled for "+selectedDate,n,p);setScanStatus("error","This participant is not scheduled for the selected date.");processing=false;return;}const existing=attendanceValue(p,selectedDate);if(existing){showLatest(p,true);setScanStatus("done","Already checked in. Ready for next scan.");processing=false;return;}const localTime=createLocalTimestamp();setAttendanceValue(p,selectedDate,localTime);addQueueEntry({id:n,date:selectedDate,localTime});showLatest(p,false);renderSelectedDate();strongFeedback();setScanStatus("local","Check-in complete on this screen.
Attendance data will be sent to GAS in a background batch.");scheduleFlush(1800);setTimeout(function(){processing=false;setScanStatus("done","Ready for next scan.");},450);}
function showLatest(p,already){const c=document.getElementById("latest-card");c.className=already?"latest warning":"latest success";c.innerHTML='<div class="latest-name">'+escapeHtml(p.Name)+'</div><div>'+escapeHtml(p.School)+'</div><div class="latest-grid"><span>ID: <b>'+escapeHtml(p.ID)+'</b></span><span>Date: <b>'+escapeHtml(selectedDate)+'</b></span><span>Oral: <b>'+escapeHtml(p["Oral No."]||"")+'</b></span><span>Poster: <b>'+escapeHtml(p["Poster No."]||"")+'</b></span><span>IJP1: <b>'+escapeHtml(p["IJP1 Group"]||"")+'</b></span><span>IJP2: <b>'+escapeHtml(p["IJP2 Group"]||"")+'</b></span></div><div class="status '+(already?"syncing":"done")+'">'+(already?"Already checked in.":"Check-in completed.")+'</div>';}
function showLatestError(m,id,p){const c=document.getElementById("latest-card");c.className="latest error";c.innerHTML='<div class="latest-name">'+escapeHtml(m)+'</div>'+(p?'<div>'+escapeHtml(p.Name)+' / '+escapeHtml(p.School)+'</div>':'')+'<small>ID: '+escapeHtml(id)+'</small>';}
function addQueueEntry(e){const dup=syncQueue.some(i=>i.id===e.id&&i.date===e.date);if(!dup){syncQueue.push(e);persistQueue();}document.getElementById("queue-count").textContent=syncQueue.length;}
function scheduleFlush(delay){if(flushTimer)clearTimeout(flushTimer);flushTimer=setTimeout(flushQueue,delay);}
async function flushQueue(){if(syncInFlight||!navigator.onLine||syncQueue.length===0)return;syncInFlight=true;const batch=syncQueue.slice(0,25);setSyncStatus("syncing","Sending "+batch.length+" queued check-in(s) to GAS...");try{const d=await gasPost({api:"batchCheckin",entries:batch});if(!d.ok)throw new Error(d.error||"Batch check-in failed.");const keys=new Set(batch.map(i=>i.id+"|"+i.date));syncQueue=syncQueue.filter(i=>!keys.has(i.id+"|"+i.date));persistQueue();if(d.updatedParticipants){d.updatedParticipants.forEach(u=>{const l=participantMap.get(normalizeId(u.ID));if(l)Object.assign(l,u);});}renderSelectedDate();setSyncStatus("done","GAS synchronized. Remaining queue: "+syncQueue.length);}catch(e){setSyncStatus("error","Local check-in is retained. GAS synchronization will retry.");}finally{syncInFlight=false;if(syncQueue.length>0)scheduleFlush(2500);}}
async function backgroundRefresh(){if(syncQueue.length>0){scheduleFlush(100);return;}try{const d=await gasGet({api:"master"});if(d.ok){participants=d.participants||[];participantMap=new Map();participants.forEach(p=>participantMap.set(normalizeId(p.ID),p));renderSelectedDate();setSyncStatus("done","Master list synchronized.");}}catch(_){} }
function applyLocalAttendance(id,date,time){const p=participantMap.get(normalizeId(id));if(p)setAttendanceValue(p,date,time);}
function restoreQueue(){try{syncQueue=JSON.parse(localStorage.getItem("skysef_batch_queue")||"[]");if(!Array.isArray(syncQueue))syncQueue=[];}catch(_){syncQueue=[];}}
function persistQueue(){localStorage.setItem("skysef_batch_queue",JSON.stringify(syncQueue));document.getElementById("queue-count").textContent=syncQueue.length;}
function createLocalTimestamp(){return new Intl.DateTimeFormat("ja-JP",{timeZone:"Asia/Tokyo",year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false}).format(new Date()).replace(/\//g,"-");}
function strongFeedback(){beep();document.body.classList.remove("flash");void document.body.offsetWidth;document.body.classList.add("flash");}
function beep(){try{const c=new (window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.type="square";o.frequency.value=980;g.gain.value=.22;o.connect(g);g.connect(c.destination);o.start();setTimeout(()=>o.frequency.value=1320,150);setTimeout(()=>{o.stop();c.close();},420);}catch(_){}}
function extractId(v){try{return new URL(v).searchParams.get("id")||"";}catch(_){const m=String(v||"").match(/[?&]id=([^&]+)/);return m?decodeURIComponent(m[1]):String(v||"").trim();}}
function normalizeId(v){return String(v||"").trim();}
function setScanStatus(t,m){const e=document.getElementById("scan-status");e.className="status "+t;e.textContent=m;}
function setSyncStatus(t,m){const e=document.getElementById("sync-status");e.className="status "+t;e.textContent=m;}
async function gasGet(params){const u=new URL(GAS_URL);Object.keys(params).forEach(k=>u.searchParams.set(k,params[k]));u.searchParams.set("t",Date.now());const r=await fetch(u.toString(),{method:"GET",cache:"no-store"});if(!r.ok)throw new Error("GAS response error: "+r.status);return await r.json();}
async function gasPost(payload){const r=await fetch(GAS_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload),cache:"no-store"});if(!r.ok)throw new Error("GAS response error: "+r.status);return await r.json();}
function escapeHtml(v){return String(v||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
</script>
</body>
</html>
